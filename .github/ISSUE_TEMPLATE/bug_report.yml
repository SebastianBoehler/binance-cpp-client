name: Bug report
description: Report incorrect behavior, build failures, or regressions.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest code snippet, command sequence, or endpoint call that reproduces the issue.
      placeholder: |
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
        cmake --build build
        ctest --test-dir build --output-on-failure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Spot REST
        - USD-M futures REST
        - COIN-M futures REST
        - Options REST
        - Spot WebSocket
        - Signing/auth
        - HTTP transport
        - Build/CMake
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or response body
      description: Remove API keys, signatures, account IDs, listen keys, and private payloads before pasting.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, signed headers, account exports, listen keys, and private payloads.
          required: true
